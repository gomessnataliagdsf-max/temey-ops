.user-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.2}

.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}

.kanban-header{padding:8px 11px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}

.funil-step{display:flex;align-items:center;gap:10px;margin-bottom:9px}

.funil-count{font-size:11px;font-weight:700;color:var(--text);width:20px;text-align:right}
.agenda-section{margin-bottom:20px}

.login-box{position:relative;z-index:1;background:rgba(49,51,56,0.95);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:fadeIn .4s ease;backdrop-filter:blur(10px)}

.empresa-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:all .2s;box-shadow:var(--shadow);cursor:pointer}

::-webkit-scrollbar{width:5px;height:5px}

function LoginPage({onLogin}){
  const [modo,setModo]=React.useState("empresa");
  const [empresa,setEmpresa]=React.useState("");
  const [login,setLogin]=React.useState("");
  const [senha,setSenha]=React.useState("");
  const [showSenha,setShowSenha]=React.useState(false);
  const [erro,setErro]=React.useState("");
  const [loading,setLoading]=React.useState(false);
  const [esqueceu,setEsqueceu]=React.useState(false);
  const [emailRec,setEmailRec]=React.useState("");
  const [msgRec,setMsgRec]=React.useState("");
  const [empresas,setEmpresas]=React.useState([]);

  React.useEffect(()=>{
    db.get("empresas","&ativa=eq.true").then(r=>{if(Array.isArray(r))setEmpresas(r);});
  },[]);

  const handleLogin=async()=>{
    setErro("");setLoading(true);
    try{
      if(modo==="master"){
        if(login===MASTER_LOGIN&&senha===MASTER_SENHA){
          onLogin({id:"master",nome:"Natalia (Master)",perfil:"master",empresa_id:null,empresa_nome:"Temay Ops"},null);
        }else{setErro("Credenciais Master inválidas.");}
        setLoading(false);return;
      }
      const emp=empresas.find(e=>e.codigo===empresa.toUpperCase()||e.nome.toUpperCase()===empresa.toUpperCase());
      if(!emp){setErro("Empresa não encontrada. Verifique o código.");setLoading(false);return;}
      const usuarios=await db.get("sistema_usuarios",`&empresa_id=eq.${emp.id}&login=eq.${login}&ativo=eq.true`);
      if(!Array.isArray(usuarios)||usuarios.length===0){setErro("Usuário não encontrado.");setLoading(false);return;}
      const u=usuarios[0];
      if(u.senha_hash!==senha){setErro("Senha incorreta.");setLoading(false);return;}
      onLogin({...u,empresa_id:emp.id,empresa_nome:emp.nome,empresa_codigo:emp.codigo},null);
    }catch(e){setErro("Erro de conexão. Tente novamente.");}
    setLoading(false);
  };

  if(esqueceu) return(
    <div className="login-temay">
      <div className="login-temay-bg"/><div className="login-grid-bg"/>
      <div className="login-box">
        <div className="login-logo-wrap"><LogoTemay size={80}/><div className="login-system-name">Esqueceu a senha?</div></div>
        <div style={{textAlign:"center",padding:"10px 0 20px"}}>
          <div style={{fontSize:44,marginBottom:16}}>🔑</div>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,color:"var(--text)",marginBottom:10}}>Entre em contato com o administrador</div>
          <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.6,marginBottom:20}}>
            A redefinição de senha é feita pelo administrador do sistema.<br/>
            Solicite a troca diretamente com ele.
          </div>
          <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"14px 16px",fontSize:12,color:"var(--text2)",textAlign:"left",marginBottom:20}}>
            <div style={{fontWeight:700,color:"var(--text)",marginBottom:6}}>📋 Como proceder:</div>
            <div style={{marginBottom:4}}>1. Informe seu <strong style={{color:"var(--text)"}}>nome</strong> e <strong style={{color:"var(--text)"}}>login</strong> ao administrador</div>
            <div style={{marginBottom:4}}>2. O administrador irá redefinir sua senha</div>
            <div>3. Acesse com a nova senha e troque se desejar</div>
          </div>
        </div>
        <button className="login-btn" onClick={()=>setEsqueceu(false)}>← Voltar ao login</button>
      </div>
    </div>
  );

  return(
    <div className="login-temay">
      <div className="login-temay-bg"/><div className="login-grid-bg"/>
      <div className="login-box">
        <div className="login-logo-wrap">
          <LogoTemay size={90}/>
          <div className="login-system-name">Temay Ops</div>
          <div className="login-system-sub">People Analytics · RH</div>
        </div>

        <div style={{display:"flex",gap:6,marginBottom:20,background:"var(--bg3)",borderRadius:"var(--radius-sm)",padding:4}}>
          <button onClick={()=>{setModo("empresa");setErro("");}} style={{flex:1,padding:"8px",borderRadius:"var(--radius-sm)",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:12,transition:"all .15s",background:modo==="empresa"?"var(--bg2)":"transparent",color:modo==="empresa"?"var(--text)":"var(--text3)",boxShadow:modo==="empresa"?"var(--shadow)":"none"}}>
            🏢 Empresa
          </button>
          <button onClick={()=>{setModo("master");setErro("");}} style={{flex:1,padding:"8px",borderRadius:"var(--radius-sm)",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:12,transition:"all .15s",background:modo==="master"?"var(--bg2)":"transparent",color:modo==="master"?"#faa61a":"var(--text3)",boxShadow:modo==="master"?"var(--shadow)":"none"}}>
            👑 Master
          </button>
        </div>

        {erro&&<div className="login-err">{erro}</div>}

        {modo==="empresa"&&(
          <>
            <div className="login-field">
              <label className="login-label">Empresa</label>
              <div className="input-wrap">
                <span className="input-icon">🏢</span>
                <input className={`login-input${erro?" err":""}`} placeholder="Nome ou código da empresa" value={empresa} onChange={e=>{setEmpresa(e.target.value);setErro("");}} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
              </div>
              <div style={{fontSize:10,color:"var(--text3)",marginTop:3}}>Ex: GRUPODIGITAL ou Grupo Digital</div>
            </div>
            <div className="login-field">
              <label className="login-label">Usuário</label>
              <div className="input-wrap">
                <span className="input-icon">👤</span>
                <input className={`login-input${erro?" err":""}`} placeholder="Seu login" value={login} onChange={e=>{setLogin(e.target.value);setErro("");}} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
              </div>
            </div>
          </>
        )}

        {modo==="master"&&(
          <div className="login-field">
            <label className="login-label">Login Master</label>
            <div className="input-wrap">
              <span className="input-icon">👑</span>
              <input className={`login-input${erro?" err":""}`} placeholder="Login master" value={login} onChange={e=>{setLogin(e.target.value);setErro("");}} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
            </div>
          </div>
        )}

        <div className="login-field">
          <label className="login-label">Senha</label>
          <div className="input-wrap">
            <span className="input-icon">🔒</span>
            <input className={`login-input${erro?" err":""}`} type={showSenha?"text":"password"} placeholder="••••••••" value={senha} onChange={e=>{setSenha(e.target.value);setErro("");}} onKeyDown={e=>e.key==="Enter"&&handleLogin()} style={{paddingRight:38}}/>
            <button style={{position:"absolute",right:11,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:13}} onClick={()=>setShowSenha(s=>!s)}>{showSenha?"🙈":"👁"}</button>
          </div>
          <div className="forgot-link" onClick={()=>setEsqueceu(true)}>Esqueceu a senha?</div>
        </div>

        <button className={`login-btn${modo==="master"?" login-btn-master":""}`} onClick={handleLogin} disabled={loading||!login||!senha||(modo==="empresa"&&!empresa)}>
          {loading?"Entrando...":(modo==="master"?"👑 Entrar como Master":"Entrar")}
        </button>
      </div>
    </div>
  );
}

function MasterDashboard({onEntrarEmpresa,onLogout}){
  const [page,setPage]=React.useState("empresas");
  const [empresas,setEmpresas]=React.useState([]);
  const [todos,setTodos]=React.useState({candidatos:[],vagas:[],usuarios:[]});
  const [loading,setLoading]=React.useState(true);
  const [modalEmpresa,setModalEmpresa]=React.useState(false);
  const [formEmp,setFormEmp]=React.useState({nome:"",codigo:""});
  const [senhaAtual,setSenhaAtual]=React.useState("");
  const [senhaNova,setSenhaNova]=React.useState("");
  const [msgSenha,setMsgSenha]=React.useState("");

  React.useEffect(()=>{
    const load=async()=>{
      const [emps,cands,vgs,usrs]=await Promise.all([
        db.get("empresas"),db.get("candidatos"),db.get("vagas"),db.get("sistema_usuarios")
      ]);
      if(Array.isArray(emps))setEmpresas(emps);
      setTodos({candidatos:Array.isArray(cands)?cands:[],vagas:Array.isArray(vgs)?vgs:[],usuarios:Array.isArray(usrs)?usrs:[]});
      setLoading(false);
    };load();
  },[]);

  const criarEmpresa=async()=>{
    if(!formEmp.nome||!formEmp.codigo)return;
    const r=await db.post("empresas",{...formEmp,codigo:formEmp.codigo.toUpperCase(),ativa:true});
    if(Array.isArray(r)&&r[0])setEmpresas(e=>[r[0],...e]);
    setModalEmpresa(false);setFormEmp({nome:"",codigo:""});
  };

  const trocarSenha=()=>{
    if(senhaAtual!==MASTER_SENHA){setMsgSenha("Senha atual incorreta.");return;}
    if(senhaNova.length<4){setMsgSenha("Nova senha deve ter ao menos 4 caracteres.");return;}
    setMsgSenha("✅ Senha alterada! (Atenção: altere também no código do sistema)");
    setTimeout(()=>{setMsgSenha("");setSenhaAtual("");setSenhaNova("");},2500);
  };

  const nav=[
    {id:"empresas",label:"Empresas",icon:IC.building},
    {id:"visaogeral",label:"Visão Geral",icon:IC.dash},
    {id:"todos_candidatos",label:"Todos Candidatos",icon:IC.cand},
    {id:"config",label:"Configurações",icon:IC.key},
  ];

  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <LogoTemay size={44}/>
          </div>
          <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid var(--border)",fontSize:10,color:"var(--text3)"}}>Painel Master</div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">Master</div>
          {nav.map(item=>(
            <button key={item.id} className={`nav-item${page===item.id?" active":""}`} onClick={()=>setPage(item.id)}>
              <I d={item.icon} s={14}/>{item.label}
            </button>
          ))}
        </nav>
        <div className="sidebar-user">
          <div className="user-avatar" style={{background:"#faa61a"}}>👑</div>
          <div>
            <div className="user-name">Natalia</div>
            <span className="user-role" style={{background:"rgba(250,166,26,0.2)",color:"#faa61a"}}>Master</span>
          </div>
          <button className="logout-btn" onClick={onLogout} title="Sair">⎋</button>
        </div>
      </aside>

      <div className="main">
        <header className="topbar">
          <div className="topbar-title">{page==="empresas"?"Empresas Cadastradas":page==="visaogeral"?"Visão Geral":page==="todos_candidatos"?"Todos os Candidatos":"Configurações"}</div>
          <span className="master-badge">👑 MASTER</span>
        </header>

        <main className="content">
          {loading?<div style={{textAlign:"center",padding:60,color:"var(--text2)"}}>Carregando...</div>:(
            <>
              {page==="empresas"&&(
                <>
                  <div className="page-header">
                    <div><div className="page-title">Empresas</div><div className="page-subtitle">{empresas.length} empresa{empresas.length!==1?"s":""} cadastrada{empresas.length!==1?"s":""}</div></div>
                    <button className="btn btn-master" onClick={()=>setModalEmpresa(true)}><I d={IC.plus} s={13}/>Nova Empresa</button>
                  </div>
                  <div className="empresa-grid">
                    {empresas.map(e=>{
                      const cands=todos.candidatos.filter(c=>c.empresa_id===e.id);
                      const vgs=todos.vagas.filter(v=>v.empresa_id===e.id);
                      const usrs=todos.usuarios.filter(u=>u.empresa_id===e.id);

                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>

                              <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>Código: <strong style={{color:"var(--green)"}}>{e.codigo}</strong></div>
                            </div>
                            <span className="badge" style={{background:e.ativa?"rgba(0,229,160,0.15)":"rgba(240,71,71,0.15)",color:e.ativa?"var(--green)":"var(--red)"}}>{e.ativa?"Ativa":"Inativa"}</span>

                            <div className="stat-item"><div className="stat-num">{cands.length}</div><div className="stat-label">Candidatos</div></div>
                            <div className="stat-item"><div className="stat-num">{vgs.filter(v=>v.status==="Aberta").length}</div><div className="stat-label">Vagas</div></div>
                            <div className="stat-item"><div className="stat-num">{usrs.length}</div><div className="stat-label">Usuários</div></div>

                </>

                        <tbody>{empresas.map(e=>(
                          <tr key={e.id}>
                            <td style={{fontWeight:600}}>{e.nome}</td>
                            <td><span style={{background:"var(--green-dim)",color:"var(--green)",padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700}}>{e.codigo}</span></td>
                            <td>{todos.candidatos.filter(c=>c.empresa_id===e.id).length}</td>
                            <td>{todos.vagas.filter(v=>v.empresa_id===e.id&&v.status==="Aberta").length}</td>
                            <td>{todos.usuarios.filter(u=>u.empresa_id===e.id).length}</td>
                            <td><span className="badge" style={{background:e.ativa?"rgba(0,229,160,0.15)":"rgba(240,71,71,0.15)",color:e.ativa?"var(--green)":"var(--red)"}}>{e.ativa?"Ativa":"Inativa"}</span></td>
                          </tr>
                        ))}</tbody>
                      </table>
                    </div>
                  </div>
                </>
              )}

              {page==="todos_candidatos"&&(
                <>
                  <div className="page-title" style={{marginBottom:16}}>Todos os Candidatos</div>
                  <div className="card">
                    <div className="table-wrap">
                      <table>
                        <thead><tr><th>Candidato</th><th>Empresa</th><th>Vaga</th><th>Recrutador</th><th>Status</th><th>Data</th></tr></thead>
                        <tbody>{todos.candidatos.map(c=>{
                          const emp=empresas.find(e=>e.id===c.empresa_id);
                          return(
                            <tr key={c.id}>
                              <td><div className="flex-center"><div className="avatar-sm">{ini(c.nome)}</div><div><div style={{fontWeight:600,fontSize:12}}>{c.nome}</div><div style={{fontSize:10,color:"var(--text3)"}}>{c.email||""}</div></div></div></td>

                              <td style={{fontSize:11}}>{c.vaga||"-"}</td>
                              <td style={{fontSize:11,color:"var(--text2)"}}>{c.recrutador||"-"}</td>
                              <td><span className="badge" style={{background:`${SC(c.status)}20`,color:SC(c.status)}}>{c.status||"Novo"}</span></td>
                              <td style={{fontSize:11,color:"var(--text3)"}}>{c.data||"-"}</td>
                            </tr>

            <div className="form-group"><label className="form-label">Nome da Empresa <span style={{color:"var(--red)"}}>*</span></label><input className="form-input" value={formEmp.nome} onChange={e=>setFormEmp(f=>({...f,nome:e.target.value}))} placeholder="Ex: Grupo Digital - Filial Sul"/></div>
            <div className="form-group"><label className="form-label">Código de Acesso <span style={{color:"var(--red)"}}>*</span></label><input className="form-input" value={formEmp.codigo} onChange={e=>setFormEmp(f=>({...f,codigo:e.target.value.toUpperCase()}))} placeholder="Ex: GRUPODIGITAL-SUL"/><div className="form-hint">Código único que os usuários usarão para entrar. Sem espaços.</div></div>
            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setModalEmpresa(false)}>Cancelar</button><button className="btn btn-master" onClick={criarEmpresa} disabled={!formEmp.nome||!formEmp.codigo}>Criar Empresa</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

        if(!empId){setLoading(false);return;}
        const filtroEmp=`&empresa_id=eq.${empId}`;
        const [c,v]=await Promise.all([
          db.get("candidatos",filtroEmp),
          db.get("vagas",filtroEmp)
        ]);
        setData({candidatos:Array.isArray(c)?c:[],vagas:Array.isArray(v)?v:[]});

  const meusCandidatos = podeVerTudo ? data.candidatos : data.candidatos.filter(c => c.recrutador===user.nome||c.recrutador===user.login);

  const nav=[
    {id:"dashboard",label:"Dashboard",always:true,icon:IC.dash},
    {id:"candidatos",label:"Candidatos",always:true,icon:IC.cand,badge:meusCandidatos.length},
    {id:"vagas",label:"Vagas",always:true,icon:IC.vaga,badge:data.vagas.filter(v=>v.status==="Aberta").length},
    {id:"agenda",label:"Agenda",always:true,icon:IC.cal},

    {id:"origens",label:"Origens",perm:podeCriarUsuarios,icon:IC.filter},

  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <LogoGD size={30}/>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:11,color:"var(--text)",lineHeight:1.2}}>{user.empresa_nome||"Empresa"}</div>
              <div style={{fontSize:9,color:"var(--green)",fontWeight:500,letterSpacing:".04em",marginTop:1}}>Temay Ops · RH</div>

          {isMasterVisit&&<div style={{marginTop:8,background:"rgba(250,166,26,0.15)",color:"#faa61a",borderRadius:6,padding:"3px 8px",fontSize:10,fontWeight:700,textAlign:"center"}}>👑 Visita Master</div>}
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">Menu</div>
          {nav.map(item=>{
            const ok=item.always||item.perm;
            return(
              <button key={item.id} className={`nav-item${page===item.id?" active":""}${!ok?" locked":""}`} onClick={()=>ok&&setPage(item.id)}>
                <I d={item.icon} s={14}/>{item.label}
                {ok&&item.badge!==undefined&&item.badge>0&&<span className="nav-badge">{item.badge}</span>}
                {!ok&&<I d={IC.lock} s={12} c="var(--text3)"/>}
              </button>
            );
          })}
        </nav>
        <div className="sidebar-user">
          <div className="user-avatar" style={{background:perfilInfo.cor}}>{ini(user.nome)}</div>

            <div className="user-name">{user.nome.split(" ")[0]}</div>

      <div className="main">

          <div style={{fontSize:11,color:"var(--green)",background:"var(--green-dim)",padding:"4px 12px",borderRadius:20,fontWeight:600}}>🟢 Online</div>

function DashboardEmp({data,origens}){
  const [f1,setF1]=React.useState("");const [f2,setF2]=React.useState("");
  const [fRec,setFRec]=React.useState("Todos");const [fOrig,setFOrig]=React.useState("Todas");const [fVaga,setFVaga]=React.useState("Todas");
  const recrutadores=[...new Set(data.candidatos.map(c=>c.recrutador).filter(Boolean))];
  const vagasU=[...new Set(data.candidatos.map(c=>c.vaga).filter(Boolean))];
  const filtrados=data.candidatos.filter(c=>{
    const dOk=(!f1||c.data>=f1)&&(!f2||c.data<=f2);
    const rOk=fRec==="Todos"||c.recrutador===fRec;
    const oOk=fOrig==="Todas"||(c.origem_contato||c.origem)===fOrig;
    const vOk=fVaga==="Todas"||c.vaga===fVaga;
    return dOk&&rOk&&oOk&&vOk;
  });
  const temF=f1||f2||fRec!=="Todos"||fOrig!=="Todas"||fVaga!=="Todas";
  const limpar=()=>{setF1("");setF2("");setFRec("Todos");setFOrig("Todas");setFVaga("Todas");};
  const total=filtrados.length;
  const aprov=filtrados.filter(c=>c.status==="Aprovado"||c.status==="Contratado").length;
  const vagasAb=data.vagas.filter(v=>v.status==="Aberta");
  const totalPosicoes=vagasAb.reduce((a,v)=>a+(parseInt(v.vagas_abertas)||1),0);
  const taxa=total>0?((aprov/total)*100).toFixed(1):0;
  const funil=[
    {etapa:"Novo",count:filtrados.filter(c=>c.status==="Novo").length,color:"#9ea3ad"},
    {etapa:"Entrevista",count:filtrados.filter(c=>c.status==="Em Entrevista").length,color:"#faa61a"},
    {etapa:"Aprovado",count:filtrados.filter(c=>c.status==="Aprovado").length,color:"#00e5a0"},
    {etapa:"Contratado",count:filtrados.filter(c=>c.status==="Contratado").length,color:"#5865f2"},
  ];
  const maxF=Math.max(...funil.map(f=>f.count),1);
  const hoje=new Date().toISOString().split("T")[0];
  const entHoje=data.candidatos.filter(c=>c.data_entrevista===hoje);
  const recentes=[...filtrados].sort((a,b)=>new Date(b.created_at||b.data)-new Date(a.created_at||a.data)).slice(0,6);

  const diasAberta=(dataAbertura)=>{
    if(!dataAbertura)return null;
    const diff=Math.floor((new Date()-new Date(dataAbertura))/(1000*60*60*24));
    return diff;
  };
  const corDias=(d)=>d===null?"var(--text3)":d<=15?"var(--green)":d<=30?"var(--yellow)":"var(--red)";

  return(
    <>
      <div className="filter-section">
        <div className="filter-title"><I d={IC.filter} s={13}/>Filtros {temF&&<span style={{background:"var(--green-dim)",color:"var(--green)",fontSize:9,padding:"1px 6px",borderRadius:20,fontWeight:700}}>ATIVO</span>}</div>
        <div className="filter-row">
          <input className="filter-input" type="date" value={f1} onChange={e=>setF1(e.target.value)} style={{maxWidth:150}}/>
          <input className="filter-input" type="date" value={f2} onChange={e=>setF2(e.target.value)} style={{maxWidth:150}}/>
          <select className="filter-select" value={fRec} onChange={e=>setFRec(e.target.value)}><option value="Todos">Todos Recrutadores</option>{recrutadores.map(r=><option key={r}>{r}</option>)}</select>
          <select className="filter-select" value={fOrig} onChange={e=>setFOrig(e.target.value)}><option value="Todas">Todas Origens</option>{ORIGEM_OPTS.map(o=><option key={o}>{o}</option>)}</select>
          <select className="filter-select" value={fVaga} onChange={e=>setFVaga(e.target.value)}><option value="Todas">Todas Vagas</option>{vagasU.map(v=><option key={v}>{v}</option>)}</select>
          {temF&&<button className="btn-clear" onClick={limpar}>✕ Limpar</button>}
        </div>
        {temF&&<div style={{fontSize:11,color:"var(--text3)",marginTop:7}}>{total} candidato{total!==1?"s":""} encontrado{total!==1?"s":""}</div>}
      </div>
      <div className="kpi-grid">
        {[
          {label:"Candidatos",value:total,sub:temF?"filtrados":"no sistema",accent:"var(--green)"},
          {label:"Vagas Abertas",value:vagasAb.length,sub:`${totalPosicoes} posições`,accent:"var(--blue)"},
          {label:"Entrevistas Hoje",value:entHoje.length,sub:"agendadas",accent:"var(--purple)"},
          {label:"Taxa Aprovação",value:`${taxa}%`,sub:"aprovados + contratados",accent:"var(--yellow)"},
        ].map(k=>(
          <div className="kpi-card" key={k.label} style={{"--accent":k.accent}}>
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value">{k.value}</div>
            <div className="kpi-sub">{k.sub}</div>
          </div>
        ))}
      </div>
      <div className="grid-3-1">
        <div className="card">
          <div className="card-header"><span className="card-title">Candidatos Recentes</span></div>
          {recentes.length===0?<div className="empty-state" style={{padding:20}}><div style={{fontSize:13}}>Nenhum resultado</div></div>:(
            <div className="table-wrap">
              <table>
                <thead><tr><th>Candidato</th><th>Vaga</th><th>Origem</th><th>Recrutador</th><th>Status</th></tr></thead>
                <tbody>{recentes.map(c=>(
                  <tr key={c.id}>
                    <td><div className="flex-center"><div className="avatar-sm">{ini(c.nome)}</div><div><div style={{fontWeight:600,fontSize:12}}>{c.nome}</div><div style={{fontSize:10,color:"var(--text3)"}}>{c.telefone||""}</div></div></div></td>
                    <td style={{fontSize:11,color:"var(--text2)"}}>{c.vaga||"-"}</td>
                    <td style={{fontSize:11,color:"var(--text2)",maxWidth:120}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.origem_contato||c.origem||"-"}</div></td>
                    <td style={{fontSize:11,color:"var(--text2)"}}>{c.recrutador||"-"}</td>
                    <td><span className="badge" style={{background:`${SC(c.status)}20`,color:SC(c.status)}}>{c.status||"Novo"}</span></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          )}
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">Funil</span></div>
          {funil.map(f=>(
            <div className="funil-step" key={f.etapa}>
              <div className="funil-label">{f.etapa}</div>
              <div className="funil-bar-wrap"><div className="funil-bar" style={{width:`${(f.count/maxF)*100}%`,background:f.color}}>{f.count>0&&<span>{f.count}</span>}</div></div>
              <div className="funil-count">{f.count}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="grid-2">
        <div className="card">
          <div className="card-header"><span className="card-title">Entrevistas Hoje</span></div>
          {entHoje.length===0?<div className="empty-state" style={{padding:20}}><div style={{fontSize:28,marginBottom:8}}>📅</div><div style={{fontSize:12}}>Nenhuma entrevista hoje</div></div>
            :entHoje.map(c=>(
              <div className="entrevista-card" key={c.id}>
                <div style={{background:"var(--green-dim)",color:"var(--green)",borderRadius:"var(--radius-sm)",padding:"7px 10px",textAlign:"center",flexShrink:0}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14}}>{c.horario_entrevista||"--:--"}</div>
                  <div style={{fontSize:9}}>hoje</div>
                </div>
                <div className="avatar-sm">{ini(c.nome)}</div>
                <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{c.nome}</div><div style={{fontSize:11,color:"var(--text2)"}}>{c.vaga}</div></div>
              </div>
            ))}
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">Vagas Abertas</span></div>
          {vagasAb.slice(0,5).map(v=>{
            const dias=diasAberta(v.data_abertura);
            return(
              <div key={v.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600}}>{v.titulo}</div>
                  <div style={{fontSize:11,color:"var(--text2)"}}>{v.departamento||""}</div>
                  {dias!==null&&<div style={{fontSize:10,color:corDias(dias),fontWeight:600,marginTop:2}}>⏱ {dias} dia{dias!==1?"s":""} aberta</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  {v.salario&&<div style={{fontSize:11,fontWeight:700,color:"var(--green)"}}>{v.salario}</div>}
                  <span className="pill pill-green">{v.vagas_abertas||1} posição{(v.vagas_abertas||1)>1?"s":""}</span>
                  {v.motivo_abertura&&<div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>{v.motivo_abertura}</div>}
                </div>
              </div>
            );
          })}
          {vagasAb.length===0&&<div className="empty-state" style={{padding:20}}><div style={{fontSize:12}}>Nenhuma vaga aberta</div></div>}
        </div>
      </div>
    </>
  );
}

function FormCandidato({candidato,vagas,candidatos,onSalvar,onFechar}){
  const hoje=new Date().toISOString().split("T")[0];
  const INIT={nome:"",email:"",telefone:"",vaga:"",origem_contato:"Tráfego Pago (Meta/Google)",perfil:"",recrutador:"",status:"Novo",tipo_entrevista:"",data_entrevista:"",horario_entrevista:"",data:hoje,link_meet:"",observacoes:""};
  const [form,setForm]=React.useState(candidato?{nome:candidato.nome||"",email:candidato.email||"",telefone:candidato.telefone||"",vaga:candidato.vaga||"",origem_contato:candidato.origem_contato||candidato.origem||"Tráfego Pago (Meta/Google)",perfil:candidato.perfil||"",recrutador:candidato.recrutador||"",status:candidato.status||"Novo",tipo_entrevista:candidato.tipo_entrevista||"",data_entrevista:candidato.data_entrevista||"",horario_entrevista:candidato.horario_entrevista||"",data:candidato.data||hoje,link_meet:candidato.link_meet||"",observacoes:candidato.observacoes||""}:INIT);
  const [erros,setErros]=React.useState({});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const validar=()=>{
    const e={};
    if(!form.nome.trim())e.nome="Nome é obrigatório";
    if(!form.vaga)e.vaga="Vaga é obrigatória";
    if(form.telefone){
      const tl=limTel(form.telefone);
      const dup=candidatos.find(c=>{if(candidato&&c.id===candidato.id)return false;return limTel(c.telefone||"")===tl&&tl.length>0;});
      if(dup)e.telefone=`Telefone já cadastrado para ${dup.nome}`;
    }
    setErros(e);return Object.keys(e).length===0;
  };

  return(
    <div className="modal-overlay" onClick={onFechar}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><span className="modal-title">{candidato?"✏️ Editar Candidato":"👤 Novo Candidato"}</span><button className="modal-close" onClick={onFechar}>×</button></div>
        <div className="modal-section">Dados Pessoais</div>
        <div className="form-group"><label className="form-label">Nome <span>*</span></label><input className={`form-input${erros.nome?" error":""}`} value={form.nome} onChange={e=>set("nome",e.target.value)} placeholder="Nome completo"/>{erros.nome&&<div className="form-error">{erros.nome}</div>}</div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">E-mail</label><input className="form-input" type="email" value={form.email} onChange={e=>set("email",e.target.value)} placeholder="email@exemplo.com"/></div>
          <div className="form-group"><label className="form-label">Telefone</label><input className={`form-input${erros.telefone?" error":""}`} value={form.telefone} onChange={e=>set("telefone",e.target.value)} placeholder="(11) 99999-9999"/>{erros.telefone&&<div className="form-error">⚠️ {erros.telefone}</div>}</div>
        </div>
        <div className="modal-section">Vaga e Origem</div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Vaga <span>*</span></label><select className={`form-input${erros.vaga?" error":""}`} value={form.vaga} onChange={e=>set("vaga",e.target.value)}><option value="">Selecione</option>{vagas.map(v=><option key={v.id}>{v.titulo}</option>)}</select>{erros.vaga&&<div className="form-error">{erros.vaga}</div>}</div>
          <div className="form-group"><label className="form-label">Origem <span>*</span></label><select className="form-input" value={form.origem_contato} onChange={e=>set("origem_contato",e.target.value)}>{ORIGEM_OPTS.map(o=><option key={o}>{o}</option>)}</select></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Perfil</label><input className="form-input" value={form.perfil} onChange={e=>set("perfil",e.target.value)} placeholder="Júnior, Pleno, Sênior..."/></div>
          <div className="form-group"><label className="form-label">Status</label><select className="form-input" value={form.status} onChange={e=>set("status",e.target.value)}>{STATUS_OPTS.map(s=><option key={s}>{s}</option>)}</select></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Recrutador</label><input className="form-input" value={form.recrutador} onChange={e=>set("recrutador",e.target.value)} placeholder="Nome do recrutador"/></div>
          <div className="form-group"><label className="form-label">Data Cadastro</label><input className="form-input" type="date" value={form.data} onChange={e=>set("data",e.target.value)}/></div>
        </div>
        <div className="modal-section">Entrevista</div>
        <div className="form-row">

function CandidatosEmp({data,setData,user,empresaId,origens,podeVerTudo}){
  const [modal,setModal]=React.useState(false);
  const [editando,setEditando]=React.useState(null);
  const [confirmDel,setConfirmDel]=React.useState(null);
  const [busca,setBusca]=React.useState("");const [fTel,setFTel]=React.useState("");
  const [fStatus,setFStatus]=React.useState("Todos");const [fOrigem,setFOrigem]=React.useState("Todas");const [fVaga,setFVaga]=React.useState("Todas");
  const [fRec,setFRec]=React.useState("Todos");
  const recrutadores=[...new Set(data.candidatos.map(c=>c.recrutador).filter(Boolean))];

  const filtrados=data.candidatos.filter(c=>{
    const bOk=!busca||c.nome?.toLowerCase().includes(busca.toLowerCase())||c.email?.toLowerCase().includes(busca.toLowerCase());
    const tOk=!fTel||limTel(c.telefone||"").includes(limTel(fTel));
    const sOk=fStatus==="Todos"||c.status===fStatus;
    const oOk=fOrigem==="Todas"||(c.origem_contato||c.origem)===fOrigem;
    const vOk=fVaga==="Todas"||c.vaga===fVaga;
    const rOk=fRec==="Todos"||c.recrutador===fRec;
    return bOk&&tOk&&sOk&&oOk&&vOk&&rOk;
  });
  const vagasU=[...new Set(data.candidatos.map(c=>c.vaga).filter(Boolean))];
  const temF=busca||fTel||fStatus!=="Todos"||fOrigem!=="Todas"||fVaga!=="Todas"||fRec!=="Todos";
  const limpar=()=>{setBusca("");setFTel("");setFStatus("Todos");setFOrigem("Todas");setFVaga("Todas");setFRec("Todos");};

  const salvar=async(form)=>{
    const item={...form,empresa_id:empresaId};
    if(editando){
      await db.patch("candidatos",editando,item);
      setData(d=>({...d,candidatos:d.candidatos.map(c=>c.id===editando?{...c,...item}:c)}));
    }else{
      const r=await db.post("candidatos",item);
      if(Array.isArray(r)&&r[0])setData(d=>({...d,candidatos:[r[0],...d.candidatos]}));
      else setData(d=>({...d,candidatos:[{...item,id:Date.now().toString()},...d.candidatos]}));
    }
    setModal(false);setEditando(null);
  };

  const excluir=async(id)=>{
    await db.delete("candidatos",id);
    setData(d=>({...d,candidatos:d.candidatos.filter(c=>c.id!==id)}));
    setConfirmDel(null);
  };

  const exportCSV=()=>{
    const cols=["Nome","Email","Telefone","Vaga","Origem","Perfil","Recrutador","Status","Data Entrevista","Horário","Observações"];
    const rows=filtrados.map(c=>[c.nome||"",c.email||"",c.telefone||"",c.vaga||"",c.origem_contato||c.origem||"",c.perfil||"",c.recrutador||"",c.status||"",c.data_entrevista||"",c.horario_entrevista||"",c.observacoes||""]);
    const csv=[cols,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="candidatos.csv";a.click();URL.revokeObjectURL(url);
  };

  return(
    <div style={{position:"relative"}}>
      <div className="page-header">
        <div><div className="page-title">Candidatos</div><div className="page-subtitle">{filtrados.length} de {data.candidatos.length}{temF?" (filtrado)":""}</div></div>
        <div style={{display:"flex",gap:10}}>
          <button className="btn btn-excel" onClick={exportCSV}><I d={IC.download} s={13}/>Exportar</button>
          <button className="btn btn-primary" onClick={()=>{setEditando(null);setModal(true);}}><I d={IC.plus} s={13}/>Novo Candidato</button>
        </div>
      </div>
      <div className="filter-section">
        <div className="filter-title"><I d={IC.filter} s={13}/>Filtros {temF&&<span style={{background:"var(--green-dim)",color:"var(--green)",fontSize:9,padding:"1px 6px",borderRadius:20,fontWeight:700}}>ATIVO</span>}</div>
        <div className="filter-row">
          <div style={{position:"relative",flex:1,minWidth:150}}><span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"var(--text3)"}}><I d={IC.search} s={13}/></span><input className="filter-input" style={{paddingLeft:32}} placeholder="Nome ou e-mail..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>
          <div style={{position:"relative",flex:1,minWidth:130}}><span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"var(--text3)"}}><I d={IC.phone} s={13}/></span><input className="filter-input" style={{paddingLeft:32}} placeholder="Telefone..." value={fTel} onChange={e=>setFTel(e.target.value)}/></div>
          <select className="filter-select" value={fStatus} onChange={e=>setFStatus(e.target.value)}><option value="Todos">Todos Status</option>{STATUS_OPTS.map(s=><option key={s}>{s}</option>)}</select>
          <select className="filter-select" value={fOrigem} onChange={e=>setFOrigem(e.target.value)}><option value="Todas">Todas Origens</option>{(origens||ORIGEM_OPTS).map(o=><option key={o}>{o}</option>)}</select>
          <select className="filter-select" value={fVaga} onChange={e=>setFVaga(e.target.value)}><option value="Todas">Todas Vagas</option>{vagasU.map(v=><option key={v}>{v}</option>)}</select>
          {podeVerTudo&&<select className="filter-select" value={fRec} onChange={e=>setFRec(e.target.value)}><option value="Todos">Todos Recrutadores</option>{recrutadores.map(r=><option key={r}>{r}</option>)}</select>}
          {temF&&<button className="btn-clear" onClick={limpar}>✕</button>}
        </div>
      </div>
      <div className="card">
        {filtrados.length===0?<div className="empty-state"><div style={{fontSize:40,marginBottom:10}}>👤</div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,marginBottom:5}}>Nenhum candidato</div><div style={{fontSize:12}}>{temF?"Ajuste os filtros":"Cadastre o primeiro"}</div></div>:(
          <div className="table-wrap">
            <table>
              <thead><tr><th>Candidato</th><th>Telefone</th><th>Origem</th><th>Vaga</th><th>Perfil</th><th>Recrutador</th><th>Status</th><th>Entrevista</th><th>Ações</th></tr></thead>
              <tbody>{filtrados.map(c=>(
                <tr key={c.id}>
                  <td><div className="flex-center"><div className="avatar-sm">{ini(c.nome)}</div><div><div style={{fontWeight:600,fontSize:12}}>{c.nome}</div><div style={{fontSize:10,color:"var(--text3)"}}>{c.email||""}</div></div></div></td>
                  <td style={{fontSize:12,color:"var(--text2)"}}>{c.telefone||"-"}</td>
                  <td style={{fontSize:11,color:"var(--text2)",maxWidth:110}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.origem_contato||c.origem||"-"}</div></td>
                  <td style={{fontSize:12,maxWidth:110}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.vaga||"-"}</div></td>
                  <td style={{fontSize:11,color:"var(--text2)"}}>{c.perfil||"-"}</td>
                  <td style={{fontSize:11,color:"var(--text2)"}}>{c.recrutador||"-"}</td>
                  <td><span className="badge" style={{background:`${SC(c.status)}20`,color:SC(c.status)}}>{c.status||"Novo"}</span></td>
                  <td style={{fontSize:11,color:"var(--text2)"}}>{c.data_entrevista?<div><div>{c.data_entrevista}</div>{c.horario_entrevista&&<div style={{color:"var(--green)",fontWeight:600}}>{c.horario_entrevista}</div>}</div>:"-"}</td>
                  <td><div style={{display:"flex",gap:4}}><button className="btn btn-ghost btn-sm" onClick={()=>{setEditando(c.id);setModal(true);}} style={{padding:"4px 7px"}}><I d={IC.edit} s={11}/></button><button className="btn btn-danger btn-sm" onClick={()=>setConfirmDel(c)} style={{padding:"4px 7px"}}><I d={IC.trash} s={11}/></button></div></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
      </div>
      {modal&&<FormCandidato candidato={editando?data.candidatos.find(c=>c.id===editando):null} vagas={data.vagas} candidatos={data.candidatos} onSalvar={salvar} onFechar={()=>{setModal(false);setEditando(null);}}/>}
      {confirmDel&&(
        <div className="modal-overlay" onClick={()=>setConfirmDel(null)}>
          <div className="modal" style={{maxWidth:340}} onClick={e=>e.stopPropagation()}>
            <div className="confirm-box"><div style={{fontSize:34,marginBottom:10}}>🗑️</div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,marginBottom:7}}>Excluir candidato?</div><div style={{fontSize:12,color:"var(--text2)",marginBottom:16}}>Tem certeza? Esta ação não pode ser desfeita.<br/><strong style={{color:"var(--text)"}}>{confirmDel.nome}</strong></div><div style={{display:"flex",gap:8,justifyContent:"center"}}><button className="btn btn-ghost" onClick={()=>setConfirmDel(null)}>Cancelar</button><button className="btn btn-danger" onClick={()=>excluir(confirmDel.id)}>Excluir</button></div></div>
          </div>
        </div>
      )}
    </div>
  );
}

function AgendaEmp({data}){

          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}><span style={{fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:600,background:"rgba(88,101,242,0.15)",color:"var(--blue)"}}>{c.tipo_entrevista||"Online"}</span><span className="badge" style={{background:`${SC(c.status)}20`,color:SC(c.status)}}>{c.status}</span></div>
        </div>
      ))}
    </div>
  );
  return(
    <>
      <div className="page-header"><div className="page-title">Agenda de Entrevistas</div></div>
      <S title="Hoje" items={com.filter(c=>c.data_entrevista===hoje)} color="#00e5a0"/>
      <S title="Amanhã" items={com.filter(c=>c.data_entrevista===amanha)} color="#5865f2"/>
      <S title="Esta Semana" items={com.filter(c=>c.data_entrevista>amanha&&c.data_entrevista<=semana)} color="#9b84ec"/>

    </>
  );
}

function PipelineEmp({data,setData}){
  const cols=["Novo","Em Entrevista","Aprovado","Reprovado","Contratado","Desistente"];
  const colC={"Novo":"#9ea3ad","Em Entrevista":"#faa61a","Aprovado":"#00e5a0","Reprovado":"#f04747","Contratado":"#5865f2","Desistente":"#9b84ec"};
  const mover=async(c,s)=>{await db.patch("candidatos",c.id,{status:s});setData(d=>({...d,candidatos:d.candidatos.map(x=>x.id===c.id?{...x,status:s}:x)}));};
  return(
    <>
      <div className="page-header"><div className="page-title">Pipeline</div><div className="page-subtitle">Use o menu para mover candidatos entre etapas</div></div>
      <div className="kanban">{cols.map(etapa=>{
        const items=data.candidatos.filter(c=>c.status===etapa);
        const cor=colC[etapa];
        return(
          <div className="kanban-col" key={etapa}>
            <div className="kanban-header" style={{background:`${cor}18`}}><span style={{fontSize:12,fontWeight:700,color:cor}}>{etapa}</span><span className="kanban-count" style={{color:cor}}>{items.length}</span></div>
            {items.map(c=>(
              <div className="kanban-item" key={c.id}>
                <div className="flex-center" style={{marginBottom:5}}><div className="avatar-sm" style={{width:22,height:22,fontSize:8}}>{ini(c.nome)}</div><div style={{fontSize:12,fontWeight:600}}>{c.nome}</div></div>
                <div style={{fontSize:11,color:"var(--text2)",marginBottom:4}}>{c.vaga}</div>
                {c.recrutador&&<div style={{fontSize:10,color:"var(--text3)",marginBottom:6}}>👤 {c.recrutador}</div>}
                <select style={{width:"100%",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",color:"var(--text2)",fontSize:10,padding:"5px 7px",outline:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}} value={etapa} onChange={e=>mover(c,e.target.value)}>{cols.map(col=><option key={col}>{col}</option>)}</select>
              </div>
            ))}
            {items.length===0&&<div style={{padding:"14px 8px",textAlign:"center",color:"var(--text3)",fontSize:11,borderRadius:"var(--radius-sm)",border:"1px dashed var(--border)"}}>Vazio</div>}
          </div>
        );
      })}</div>
    </>
  );
}

function UsuariosEmp({empresaId,user}){
  const [usuarios,setUsuarios]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [modal,setModal]=React.useState(false);
  const [modalSenha,setModalSenha]=React.useState(null);
  const [confirmDel,setConfirmDel]=React.useState(null);
  const [form,setForm]=React.useState({nome:"",email:"",login:"",senha_hash:"Temay@2025",perfil:"assistente"});
  const [senhaNova,setSenhaNova]=React.useState("");
  const [msg,setMsg]=React.useState("");

  React.useEffect(()=>{
    if(empresaId){
      db.get("sistema_usuarios",`&empresa_id=eq.${empresaId}`).then(r=>{if(Array.isArray(r))setUsuarios(r);setLoading(false);});
    }else{setLoading(false);}
  },[empresaId]);

  const salvar=async()=>{
    if(!form.nome||!form.login)return;
    const r=await db.post("sistema_usuarios",{...form,empresa_id:empresaId,ativo:true});
    if(Array.isArray(r)&&r[0])setUsuarios(u=>[r[0],...u]);
    setModal(false);setForm({nome:"",email:"",login:"",senha_hash:"Temay@2025",perfil:"assistente"});
  };

  const trocarSenha=async()=>{
    if(!senhaNova||senhaNova.length<4){setMsg("Mínimo 4 caracteres.");return;}
    await db.patch("sistema_usuarios",modalSenha.id,{senha_hash:senhaNova});
    setUsuarios(u=>u.map(x=>x.id===modalSenha.id?{...x,senha_hash:senhaNova}:x));
    setMsg("✅ Senha alterada com sucesso!");
    setTimeout(()=>{setModalSenha(null);setMsg("");setSenhaNova("");},2000);
  };

  const toggleAtivo=async(u)=>{
    if(u.id===user.id)return;
    await db.patch("sistema_usuarios",u.id,{ativo:!u.ativo});
    setUsuarios(us=>us.map(x=>x.id===u.id?{...x,ativo:!x.ativo}:x));
  };

  const excluir=async(id)=>{
    await db.delete("sistema_usuarios",id);
    setUsuarios(u=>u.filter(x=>x.id!==id));
    setConfirmDel(null);
  };

  if(loading)return <div style={{textAlign:"center",padding:40,color:"var(--text2)"}}>Carregando...</div>;

  return(
    <div style={{position:"relative"}}>
      <div className="page-header">
        <div><div className="page-title">Usuários</div><div className="page-subtitle">{usuarios.length} usuário{usuarios.length!==1?"s":""} cadastrado{usuarios.length!==1?"s":""}</div></div>
        <button className="btn btn-primary" onClick={()=>setModal(true)}><I d={IC.plus} s={13}/>Novo Usuário</button>
      </div>
      <div className="users-grid">
        {usuarios.map(u=>{
          const pm=PERFIS[u.perfil]||PERFIS.assistente;
          return(
            <div className="user-card" key={u.id}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div style={{width:44,height:44,borderRadius:"50%",background:pm.cor,color:"#000",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14}}>{ini(u.nome)}</div>
                <span className="badge" style={{background:u.ativo?"rgba(0,229,160,0.15)":"rgba(240,71,71,0.15)",color:u.ativo?"var(--green)":"var(--red)"}}>{u.ativo?"Ativo":"Inativo"}</span>
              </div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,marginBottom:2}}>{u.nome}</div>
              <div style={{fontSize:11,color:"var(--text2)",marginBottom:6}}>{u.email||"Sem e-mail"}</div>
              <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10}}>
                <span className="badge" style={{background:`${pm.cor}20`,color:pm.cor}}>{pm.label}</span>
                <span style={{fontSize:10,color:"var(--text3)"}}>@{u.login}</span>
              </div>
              {u.id!==user.id&&(
                <div style={{display:"flex",gap:6}}>
                  <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:"center"}} onClick={()=>toggleAtivo(u)}>{u.ativo?"Desativar":"Ativar"}</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>{setModalSenha(u);setSenhaNova("");setMsg("");}}>🔑</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>setConfirmDel(u)}><I d={IC.trash} s={11}/></button>
                </div>
              )}
              {u.id===user.id&&<div style={{fontSize:11,color:"var(--green)",fontWeight:600}}>← Você</div>}
            </div>
          );
        })}
      </div>

      {modal&&(
        <div className="modal-overlay" onClick={()=>setModal(false)}>
          <div className="modal" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><span className="modal-title">👤 Novo Usuário</span><button className="modal-close" onClick={()=>setModal(false)}>×</button></div>
            <div className="form-row"><div className="form-group"><label className="form-label">Nome <span style={{color:"var(--red)"}}>*</span></label><input className="form-input" value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))}/></div><div className="form-group"><label className="form-label">E-mail</label><input className="form-input" type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></div></div>
            <div className="form-row"><div className="form-group"><label className="form-label">Login <span style={{color:"var(--red)"}}>*</span></label><input className="form-input" value={form.login} onChange={e=>setForm(f=>({...f,login:e.target.value.toLowerCase()}))} placeholder="Ex: joao.silva"/><div className="form-hint">Sem espaços, letras minúsculas</div></div><div className="form-group"><label className="form-label">Perfil</label><select className="form-input" value={form.perfil} onChange={e=>setForm(f=>({...f,perfil:e.target.value}))}><option value="coordenador">Coordenador RH</option><option value="assistente">Assistente RH</option><option value="auxiliar">Auxiliar RH</option></select></div></div>
            <div className="form-group"><label className="form-label">Senha inicial</label><input className="form-input" value={form.senha_hash} onChange={e=>setForm(f=>({...f,senha_hash:e.target.value}))}/><div className="form-hint">Padrão: Temay@2025 — o usuário pode trocar depois</div></div>
            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={salvar} disabled={!form.nome||!form.login}>Criar Usuário</button></div>
          </div>
        </div>
      )}

      {modalSenha&&(
        <div className="modal-overlay" onClick={()=>setModalSenha(null)}>
          <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><span className="modal-title">🔑 Alterar Senha</span><button className="modal-close" onClick={()=>setModalSenha(null)}>×</button></div>
            <div style={{fontSize:13,color:"var(--text2)",marginBottom:14}}>Alterando senha de <strong style={{color:"var(--text)"}}>{modalSenha.nome}</strong></div>
            <div className="form-group"><label className="form-label">Nova senha</label><input className="form-input" type="password" value={senhaNova} onChange={e=>setSenhaNova(e.target.value)} placeholder="Mínimo 4 caracteres"/></div>
            {msg&&<div style={{fontSize:12,color:msg.includes("✅")?"var(--green)":"var(--red)",marginBottom:10}}>{msg}</div>}
            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setModalSenha(null)}>Cancelar</button><button className="btn btn-primary" onClick={trocarSenha}>Salvar Senha</button></div>
          </div>
        </div>
      )}

      {confirmDel&&(
        <div className="modal-overlay" onClick={()=>setConfirmDel(null)}>
          <div className="modal" style={{maxWidth:340}} onClick={e=>e.stopPropagation()}>
            <div className="confirm-box"><div style={{fontSize:34,marginBottom:10}}>🗑️</div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,marginBottom:7}}>Excluir usuário?</div><div style={{fontSize:12,color:"var(--text2)",marginBottom:16}}><strong style={{color:"var(--text)"}}>{confirmDel.nome}</strong></div><div style={{display:"flex",gap:8,justifyContent:"center"}}><button className="btn btn-ghost" onClick={()=>setConfirmDel(null)}>Cancelar</button><button className="btn btn-danger" onClick={()=>excluir(confirmDel.id)}>Excluir</button></div></div>
          </div>
        </div>
      )}
    </div>
  );
}

function OrigensEmp({origens,setOrigens}){
  const [nova,setNova]=React.useState("");
  const [editIdx,setEditIdx]=React.useState(null);
  const [editVal,setEditVal]=React.useState("");

  const adicionar=()=>{
    if(!nova.trim())return;
    setOrigens(o=>[...o,nova.trim()]);
    setNova("");
  };
  const excluir=(idx)=>setOrigens(o=>o.filter((_,i)=>i!==idx));
  const salvarEdit=()=>{
    if(!editVal.trim())return;
    setOrigens(o=>o.map((x,i)=>i===editIdx?editVal.trim():x));
    setEditIdx(null);setEditVal("");
  };

  return(
    <>
      <div className="page-header"><div className="page-title">Origens de Candidatos</div><div className="page-subtitle">Gerencie as origens disponíveis no cadastro</div></div>
      <div className="card" style={{maxWidth:500}}>
        <div className="card-title" style={{marginBottom:14}}>Adicionar nova origem</div>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          <input className="form-input" value={nova} onChange={e=>setNova(e.target.value)} placeholder="Ex: WhatsApp Business" onKeyDown={e=>e.key==="Enter"&&adicionar()} style={{flex:1}}/>
          <button className="btn btn-primary" onClick={adicionar} disabled={!nova.trim()}><I d={IC.plus} s={13}/>Adicionar</button>
        </div>
        <div className="card-title" style={{marginBottom:12}}>Origens cadastradas ({origens.length})</div>
        {origens.map((o,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
            {editIdx===i?(
              <>
                <input className="form-input" style={{flex:1}} value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&salvarEdit()}/>
                <button className="btn btn-primary btn-sm" onClick={salvarEdit}>Salvar</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setEditIdx(null)}>✕</button>
              </>
            ):(
              <>
                <div style={{flex:1,fontSize:13}}>{o}</div>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setEditIdx(i);setEditVal(o);}}><I d={IC.edit} s={11}/></button>
                <button className="btn btn-danger btn-sm" onClick={()=>excluir(i)}><I d={IC.trash} s={11}/></button>
              </>
            )}
          </div>
        ))}
      </div>
    </>
  );
}

function AccessDenied(){return(<div className="empty-state card"><div style={{fontSize:40,marginBottom:10}}>🔒</div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,marginBottom:5}}>Acesso Restrito</div><div style={{fontSize:12}}>Seu perfil não tem permissão.</div></div>);}

function App(){
  const [user,setUser]=React.useState(null);
  const [token,setToken]=React.useState(null);
  const [empresaMaster,setEmpresaMaster]=React.useState(null);

  const handleLogin=(u,t)=>{setUser(u);setToken(t);};
  const handleLogout=()=>{setUser(null);setToken(null);setEmpresaMaster(null);};
  const entrarEmpresa=(emp)=>{
    setEmpresaMaster(emp);
    setUser(u=>({...u,empresa_id:emp.id,empresa_nome:emp.nome,empresa_codigo:emp.codigo,perfil:"master"}));
  };

  if(!user)return <LoginPage onLogin={handleLogin}/>;
  if(user.perfil==="master"&&!empresaMaster)return <MasterDashboard onEntrarEmpresa={entrarEmpresa} onLogout={handleLogout}/>;
  return <SistemaEmpresa user={user} onLogout={handleLogout}/>;
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
